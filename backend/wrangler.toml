# abyss-durable-orchestrator — Phase 4 Cloudflare-native durable backend
#
# Secrets (set via `wrangler secret put`):
#   OPENROUTER_API_KEY      — OpenRouter API key for LLM calls
# D1/R2:
#   Create/bind the database and bucket named below before deployment.
#   R2 (matches [[r2_buckets]] bucket_name): pnpm r2:bucket:create
#   Verify: pnpm r2:bucket:info | pnpm r2:buckets:list
#   From repo root: pnpm backend:r2:bucket:create (same for :info / :list).

name = "abyss-durable-orchestrator"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# ---------------------------------------------------------------------------
# Module aliasing for Wrangler's esbuild-based bundler.
# ---------------------------------------------------------------------------
[alias]
# Esbuild alias substitution does not resolve a directory to index.ts; point at the entry file.
"@contracts" = "../src/features/generationContracts/index.ts"

# ---------------------------------------------------------------------------
# Workflow bindings — one Cloudflare Workflow class per pipeline kind.
# ---------------------------------------------------------------------------
[[workflows]]
name = "crystal-trial-workflow"
binding = "CRYSTAL_TRIAL_WORKFLOW"
class_name = "CrystalTrialWorkflow"

[[workflows]]
name = "topic-expansion-workflow"
binding = "TOPIC_EXPANSION_WORKFLOW"
class_name = "TopicExpansionWorkflow"

[[workflows]]
name = "subject-graph-workflow"
binding = "SUBJECT_GRAPH_WORKFLOW"
class_name = "SubjectGraphWorkflow"

[[workflows]]
name = "topic-content-workflow"
binding = "TOPIC_CONTENT_WORKFLOW"
class_name = "TopicContentWorkflow"

# ---------------------------------------------------------------------------
# D1 queryable durable state.
# ---------------------------------------------------------------------------
[[d1_databases]]
binding = "GENERATION_DB"
database_name = "abyss-generation-state"
database_id = "00000000-0000-0000-0000-000000000000" # replace with production D1 database id

# ---------------------------------------------------------------------------
# R2 artifact storage.
# ---------------------------------------------------------------------------
[[r2_buckets]]
binding = "GENERATION_ARTIFACTS_BUCKET"
bucket_name = "abyss-generation-artifacts"

# ---------------------------------------------------------------------------
# Durable Objects are intentionally not bound for v1. Add a narrow binding only
# after a proven D1 contention or live-fanout coordination need.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Environment variables (non-secret — safe for version control).
# ---------------------------------------------------------------------------
[vars]
# Allowed CORS origins for the API surface (comma-separated).
# Production origin(s) go first; localhost is always included for dev.
ALLOWED_ORIGINS = "https://abyss.globesoul.com,https://littlething666.github.io,http://localhost:3000"

