name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # config/next-public-env.mjs owns the canonical NEXT_PUBLIC_* key list,
      # so workflow env wiring can't drift from runtime reads in app code.
      - name: Prepare NEXT_PUBLIC variables from workflow vars
        env:
          NEXT_PUBLIC_VARS_JSON: ${{ toJson(vars) }}
        run: |
          node --input-type=module <<'EOF'
          import { appendFileSync } from 'node:fs';
          import {
            NEXT_PUBLIC_BUILD_ENV_KEYS,
          } from './config/next-public-env.mjs';

          const vars = JSON.parse(process.env.NEXT_PUBLIC_VARS_JSON || '{}');
          const githubEnv = process.env.GITHUB_ENV;
          if (!githubEnv) {
            throw new Error('GITHUB_ENV is not available.');
          }

          const missingRequired = NEXT_PUBLIC_BUILD_ENV_KEYS.filter((key) => {
            const value = vars[key];
            return typeof value !== 'string' || value.trim().length === 0;
          });

          if (missingRequired.length > 0) {
            throw new Error(`Missing required GitHub workflow variables: ${missingRequired.join(', ')}`);
          }

          const lines = NEXT_PUBLIC_BUILD_ENV_KEYS.map((key) => {
            const value = vars[key];
            if (typeof value !== 'string') {
              return `${key}=`;
            }
            return `${key}=${value}`;
          });

          appendFileSync(githubEnv, `${lines.join('\n')}\n`);
          EOF

      - name: Build static site for GitHub Pages root
        run: pnpm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
