# Unit tests + TypeScript compile on pull requests (src changes only)
name: PR Unit Tests

on:
  pull_request:
    paths:
      - 'src/**'

permissions:
  contents: read

jobs:
  unit:
    name: Typecheck & Vitest
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        id: install
        run: pnpm install --frozen-lockfile

      # Both gates run independently after a successful install so a
      # typecheck failure no longer short-circuits the unit suite -- a
      # single CI run surfaces both signals at once.
      #
      # `if:` uses GitHub Actions' bare-expression form (no ${ } wrapper)
      # so this YAML survives any future round-trips through tooling that
      # treats double-curly sequences as placeholders.
      - name: Typecheck
        if: "!cancelled() && steps.install.outcome == 'success'"
        run: pnpm run check:compile

      - name: Unit tests
        if: "!cancelled() && steps.install.outcome == 'success'"
        run: pnpm run test:unit:run
