# Playwright E2E Matrix - WebGPU CI
name: E2E WebGPU

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  # workflow_run:
  #   workflows:
  #     - 'Deploy to GitHub Pages'
  #   types:
  #     - completed
  #   branches:
  #     - main

jobs:
  smoke:
    name: Chromium Headless Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true
      PW_ENABLE_NO_SANDBOX: 1
      # WebGPU via Dawn → Vulkan ICD provided by Mesa lavapipe (installed below).
      # `--use-angle=swiftshader` is intentionally dropped: it only affects
      # WebGL (ANGLE), not WebGPU (Dawn), and masked the missing ICD for weeks.
      PW_WEBGPU_FLAGS: --enable-unsafe-webgpu,--enable-features=Vulkan
      PW_CI_BUILT_SERVER: '1'
      NEXT_PUBLIC_PLAYWRIGHT: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vulkan + Mesa lavapipe (software WebGPU backend)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            mesa-vulkan-drivers \
            libvulkan1 \
            vulkan-tools
          echo "VK_ICD_FILENAMES=/usr/share/vulkan/icd.d/lvp_icd.x86_64.json" >> "$GITHUB_ENV"

      - name: Verify Vulkan adapter
        run: vulkaninfo --summary | head -n 40

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm run test:e2e:install

      - name: Build app (production)
        run: pnpm run build

      - name: Run smoke E2E spec
        run: pnpm run test:e2e:smoke

      - name: Upload Playwright smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-artifacts
          path: |
            playwright-report
            playwright-results
            tests/**/__snapshots__
          if-no-files-found: ignore
          retention-days: 14

  full:
    name: Chromium Headless Full E2E
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 45
    env:
      CI: true
      PW_ENABLE_NO_SANDBOX: 1
      PW_WEBGPU_FLAGS: --enable-unsafe-webgpu,--enable-features=Vulkan
      PW_CI_BUILT_SERVER: '1'
      NEXT_PUBLIC_PLAYWRIGHT: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vulkan + Mesa lavapipe (software WebGPU backend)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            mesa-vulkan-drivers \
            libvulkan1 \
            vulkan-tools
          echo "VK_ICD_FILENAMES=/usr/share/vulkan/icd.d/lvp_icd.x86_64.json" >> "$GITHUB_ENV"

      - name: Verify Vulkan adapter
        run: vulkaninfo --summary | head -n 40

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm run test:e2e:install

      - name: Build app (production)
        run: pnpm run build

      - name: Run full E2E suite
        run: pnpm run test:e2e:ci

      - name: Upload Playwright full artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-full-artifacts
          path: |
            playwright-report
            playwright-results
            tests/**/__snapshots__
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: playwright-results/**/trace.zip
          if-no-files-found: ignore
          retention-days: 14
